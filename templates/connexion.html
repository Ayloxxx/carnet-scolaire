<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Mon Carnet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            background: #f0ebe0;
            background-image: repeating-linear-gradient(
                transparent, transparent 31px,
                #c8dff0 31px, #c8dff0 32px
            );
            overflow: hidden;
        }

        /* Côté gauche décoratif */
        .left-panel {
            width: 45%;
            background: #2c5f8a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            top: -80px;
            left: -80px;
        }

        .left-panel::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            bottom: -50px;
            right: -50px;
        }

        .left-panel h1 {
            font-family: 'Caveat', cursive;
            font-size: 3rem;
            color: white;
            text-align: center;
            margin-top: 20px;
            line-height: 1.2;
        }

        .left-panel p {
            color: rgba(255,255,255,0.7);
            text-align: center;
            margin-top: 15px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .emoji-big {
            font-size: 5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Côté droit formulaire */
        .right-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .form-box {
            width: 100%;
            max-width: 380px;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .form-box h2 {
            font-family: 'Caveat', cursive;
            font-size: 2.2rem;
            color: #2c5f8a;
            margin-bottom: 5px;
        }

        .form-box .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .erreur {
            background: #fde8e8;
            color: #c62828;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            border-left: 4px solid #c62828;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-weight: 700;
            color: #2c5f8a;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .field input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #d4c9b0;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            background: white;
            color: #2a2a2a;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input:focus {
            outline: none;
            border-color: #2c5f8a;
            box-shadow: 0 0 0 3px rgba(44, 95, 138, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: #2c5f8a;
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 5px;
        }

        .btn-submit:hover {
            background: #4a90d9;
            transform: translateY(-1px);
        }

        .link-bottom {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 0.95rem;
        }

        .link-bottom a {
            color: #2c5f8a;
            font-weight: 700;
            text-decoration: none;
        }

        .link-bottom a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .left-panel { display: none; }
        }
    </style>
</head>
<body>

<!-- Panneau gauche -->
<div class="left-panel">
    <div class="emoji-big">🎓</div>
    <h1>Mon Carnet Scolaire</h1>
    <p>Organise tes cours, tes notes<br>et tes devoirs en un seul endroit</p>
</div>

<!-- Panneau droit -->
<div class="right-panel">
    <div class="form-box">
        <h2>Bon retour ! 👋</h2>
        <p class="subtitle">Connecte-toi pour accéder à ton carnet</p>

        {% if erreur %}
        <div class="erreur">❌ {{ erreur }}</div>
        {% endif %}

        <form method="post">
            <div class="field">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" placeholder="Ex: lucas.martin" autofocus>
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Se connecter →</button>
        </form>

        <p class="link-bottom">
            Pas encore de compte ? <a href="/inscriptions">S'inscrire</a>
        </p>
    </div>
</div>

<script>
    var savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    var couleur = localStorage.getItem('couleurTheme');
    if (couleur) {
        document.querySelector('.left-panel').style.background = couleur;
        document.querySelector('.form-box h2').style.color = couleur;
    }
</script>

</body>
</html>
