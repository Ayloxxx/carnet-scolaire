<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Inscription - Mon Carnet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            background: #f0ebe0;
            background-image: repeating-linear-gradient(
                transparent, transparent 31px,
                #c8dff0 31px, #c8dff0 32px
            );
            overflow: hidden;
        }

        .left-panel {
            width: 45%;
            background: #2c5f8a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            top: -80px; left: -80px;
        }

        .left-panel::after {
            content: '';
            position: absolute;
            width: 200px; height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            bottom: -50px; right: -50px;
        }

        .left-panel h1 {
            font-family: 'Caveat', cursive;
            font-size: 2.5rem;
            color: white;
            text-align: center;
            margin-top: 20px;
        }

        .features {
            margin-top: 30px;
            list-style: none;
        }

        .features li {
            color: rgba(255,255,255,0.85);
            padding: 8px 0;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .emoji-big {
            font-size: 5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .right-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .form-box {
            width: 100%;
            max-width: 380px;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .form-box h2 {
            font-family: 'Caveat', cursive;
            font-size: 2.2rem;
            color: #2c5f8a;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-weight: 700;
            color: #2c5f8a;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .field input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #d4c9b0;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            background: white;
            color: #2a2a2a;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input:focus {
            outline: none;
            border-color: #2c5f8a;
            box-shadow: 0 0 0 3px rgba(44, 95, 138, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: #2c5f8a;
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 5px;
        }

        .btn-submit:hover {
            background: #4a90d9;
            transform: translateY(-1px);
        }

        .link-bottom {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 0.95rem;
        }

        .link-bottom a {
            color: #2c5f8a;
            font-weight: 700;
            text-decoration: none;
        }

        .link-bottom a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .left-panel { display: none; }
        }
    </style>
</head>
<body>

<div class="left-panel">
    <div class="emoji-big">📒</div>
    <h1>Rejoins Mon Carnet !</h1>
    <ul class="features">
        <li>🗓️ Emploi du temps A/B</li>
        <li>📊 Suivi des notes</li>
        <li>📚 Gestion des devoirs</li>
        <li>💬 Commentaires des profs</li>
        <li>🎨 Thème personnalisable</li>
    </ul>
</div>

<div class="right-panel">
    <div class="form-box">
        <h2>Créer un compte 🎉</h2>
        <p class="subtitle">C'est gratuit et ça prend 10 secondes !</p>

        <form method="post">
            <div class="field">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" placeholder="Ex: lucas.martin" autofocus>
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="Choisis un mot de passe">
            </div>
            <button type="submit" class="btn-submit">Créer mon compte →</button>
        </form>

        <p class="link-bottom">
            Déjà un compte ? <a href="/connexion">Se connecter</a>
        </p>
    </div>
</div>

<script>
    var couleur = localStorage.getItem('couleurTheme');
    if (couleur) {
        document.querySelector('.left-panel').style.background = couleur;
        document.querySelector('.form-box h2').style.color = couleur;
    }
</script>

</body>
</html>
