{% extends 'base.html' %}

{% block content %}
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<h1>✏️ Modifier le devoir</h1>

<form method="post">
    <label>Matière :</label>
    <select name="matiere_id">
        {% for matiere in les_matieres %}
            <option value="{{ matiere[0] }}" {% if matiere[0] == devoir[1] %}selected{% endif %}>{{ matiere[1] }}</option>
        {% endfor %}
    </select><br><br>

    <label>Titre :</label>
    <input type="text" name="titre" value="{{ devoir[2] }}"><br><br>

    <label>Contenu / Description :</label>
    <input type="text" name="contenu" value="{{ devoir[3] if devoir[3] else '' }}"><br><br>

    <label>Date limite :</label>
    <input type="date" name="date" value="{{ devoir[4] }}"><br><br>

    <label>Heure :</label>
    <select name="heure">
        <option value="">-- Pas d'heure précise --</option>
        {% for h in ['8h00-8h55', '8h55-9h50', '10h10-11h05', '11h05-12h00', '12h55-13h50', '13h50-14h45', '15h05-16h00', '16h00-16h55'] %}
        <option value="{{ h }}" {% if devoir[5] == h %}selected{% endif %}>{{ h }}</option>
        {% endfor %}
    </select><br><br>

    <label>Semaine :</label>
    <select name="semaine">
        <option value="A" {% if devoir[6] == 'A' %}selected{% endif %}>Semaine A</option>
        <option value="B" {% if devoir[6] == 'B' %}selected{% endif %}>Semaine B</option>
        <option value="" {% if not devoir[6] %}selected{% endif %}>-- Peu importe --</option>
    </select><br><br>

    <button type="submit">Sauvegarder</button>
    <a href="/devoirs" class="annuler-link">Annuler</a>
</form>

{% endblock %}
